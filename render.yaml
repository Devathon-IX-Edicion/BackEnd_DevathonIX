databases:
  - name: 
    plan: free
    databaseName: 
    user: 

services:
  - type: web
    plan: free
    name: miproyecto
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn miproyecto.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: miproyectodb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4